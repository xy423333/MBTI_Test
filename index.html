<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>MBTI 测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-500 via-pink-400 to-blue-500 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-6 text-center">

    <!-- 标题 -->
    <h1 class="text-2xl font-bold text-purple-600 mb-2">MBTI 测试</h1>
    <p class="text-gray-500 mb-4 text-sm">探索你的性格类型 ✨</p>

    <!-- 进度条 -->
    <div class="w-full bg-gray-200 rounded-full h-2 mb-6 overflow-hidden">
        <div id="progressBar" 
             class="bg-purple-500 h-2 rounded-full transition-all duration-500"
             style="width:0%">
        </div>
    </div>

    <!-- 开始页 -->
    <div id="startScreen">
        <button onclick="startQuiz()" 
        class="w-full bg-purple-500 text-white py-4 rounded-2xl text-lg font-semibold active:scale-95 transition">
            开始测试 🚀
        </button>
    </div>

    <!-- 问题 -->
    <div id="quiz" style="display:none;">
        <p id="question" class="text-lg font-semibold mb-6 leading-relaxed"></p>
        <div id="options" class="space-y-3"></div>
    </div>

    <!-- 结果 -->
    <div id="result" style="display:none;">
        <h2 class="text-lg text-gray-600">你的类型是</h2>
        <p id="resultText" class="text-3xl font-bold text-purple-600 mt-2"></p>

        <button onclick="restartQuiz()" 
        class="mt-6 w-full bg-green-500 text-white py-3 rounded-2xl text-lg active:scale-95 transition">
            再测一次
        </button>
    </div>

</div>
</body>

<script src="script.js"></script>
</body>
</html>

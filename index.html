<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>MBTI 测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-500 via-pink-400 to-blue-500 min-h-screen flex items-center justify-center">

<div class="max-w-md w-full mx-4 bg-white p-8 rounded-3xl shadow-2xl text-center">

    <h1 class="text-3xl font-bold mb-4 text-purple-600">MBTI 测试</h1>

    <!-- 进度条 -->
    <div class="w-full bg-gray-200 rounded-full h-3 mb-6">
        <div id="progressBar" class="bg-purple-500 h-3 rounded-full" style="width:0%"></div>
    </div>

    <!-- 开始 -->
    <div id="startScreen">
        <button onclick="startQuiz()" class="bg-purple-500 text-white px-6 py-3 rounded-xl">
            开始测试
        </button>
    </div>

    <!-- 问题 -->
    <div id="quiz" style="display:none;">
        <p id="question" class="mb-4"></p>
        <div id="options"></div>
    </div>

    <!-- 结果 -->
    <div id="result" style="display:none;">
        <h2>你的类型是：</h2>
        <p id="resultText" class="text-2xl font-bold"></p>
        <button onclick="restartQuiz()" class="mt-4 bg-green-500 text-white px-4 py-2 rounded">
            再测一次
        </button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>

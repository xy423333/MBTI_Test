<body class="bg-gradient-to-br from-purple-500 via-pink-400 to-blue-500 min-h-screen flex items-center justify-center">
<!-- 🆕 背景升级 + 垂直居中 -->

<div class="max-w-md w-full mx-4 bg-white p-8 rounded-3xl shadow-2xl text-center transition-all duration-500 hover:-translate-y-1 hover:shadow-purple-300">
<!-- 🆕 卡片更圆 + 阴影更强 + 悬浮动画 -->

    <!-- 🆕 新增标题设计 -->
    <h1 class="text-3xl font-extrabold mb-2 text-purple-600">MBTI 测试</h1>
    <p class="text-gray-500 mb-6">探索你的性格类型 ✨</p>

    <!-- 🆕 新增进度条 -->
    <div class="w-full bg-gray-200 rounded-full h-3 mb-6">
        <div id="progressBar" class="bg-purple-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
    </div>

    <!-- 开始页面 -->
    <div id="startScreen">
        <button onclick="startQuiz()" 
        class="bg-purple-500 hover:bg-purple-600 text-white px-8 py-3 rounded-full shadow-lg hover:scale-105 active:scale-95 transition">
        <!-- 🆕 按钮动画（放大 + 点击缩小） -->
            开始测试 🚀
        </button>
    </div>

    <!-- 问题区域 -->
    <div id="quiz" class="opacity-0 transition-opacity duration-500" style="display:none;">
    <!-- 🆕 opacity + transition（用于淡入动画） -->
        <p id="question" class="text-xl font-semibold mb-6"></p>
        <div id="options" class="space-y-3"></div>
        <!-- 🆕 space-y-3（按钮之间有间距） -->
    </div>

    <!-- 结果区域 -->
    <div id="result" class="opacity-0 transition-opacity duration-500" style="display:none;">
    <!-- 🆕 同样加淡入动画 -->
        <h2 class="text-xl font-semibold mt-4">你的类型是：</h2>
        <p id="resultText" class="text-4xl font-bold text-purple-600 mt-4"></p>

        <button onclick="restartQuiz()" 
        class="mt-6 bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-full shadow hover:scale-105 active:scale-95 transition">
        <!-- 🆕 同样按钮动画 -->
            再测一次
        </button>
    </div>

</div>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 测试</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 你自己的CSS（可以留着） -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-r from-purple-400 to-blue-500">

    <div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl text-center">
        
        <!-- 开始页面 -->
     <div id="startScreen">
     <h1 class="text-2xl font-bold mb-6">MBTI 测试</h1>
     <p class="mb-6 text-gray-600">了解你的性格类型</p>
     <button onclick="startQuiz()" 
        class="bg-purple-500 hover:bg-purple-600 text-white px-6 py-3 rounded-xl">
        开始测试
    </button>
</div>

        <!-- 问题区域 -->
        <div id="quiz" style="display:none;">
            <p id="question" class="text-lg mb-6">正在加载问题...</p>
            <div id="options"></div>
        </div>

        <!-- 结果区域 -->
        <div id="result" style="display:none;">
            <h2 class="text-xl font-semibold mt-4">你的测试结果是：</h2>
            <p id="resultText" class="text-2xl font-bold mt-2"></p>
            <button onclick="restartQuiz()" 
                class="mt-6 bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl">
                重新测试
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
